<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>一些小破烂 · 收藏夹</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0a0a0f;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 40px 20px;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ===== 背景层 ===== */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 30s linear infinite;
        }

        @keyframes gridMove {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(60px, 60px);
            }
        }

        .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.3;
            animation: glowFloat 12s ease-in-out infinite alternate;
        }
        .glow:nth-child(2) {
            width: 500px;
            height: 500px;
            background: #a855f7;
            top: -150px;
            left: -100px;
        }
        .glow:nth-child(3) {
            width: 400px;
            height: 400px;
            background: #ec4899;
            bottom: -100px;
            right: -100px;
            animation-delay: -4s;
        }
        .glow:nth-child(4) {
            width: 350px;
            height: 350px;
            background: #06b6d4;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -8s;
            opacity: 0.15;
        }

        @keyframes glowFloat {
            0% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(60px, -40px) scale(1.2);
            }
            66% {
                transform: translate(-30px, 50px) scale(0.9);
            }
            100% {
                transform: translate(40px, -20px) scale(1.1);
            }
        }

        /* ===== 主容器 ===== */
        .container {
            position: relative;
            z-index: 10;
            max-width: 900px;
            margin: 0 auto;
        }

        /* ===== 标题 ===== */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .rainbow-title {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 900;
            letter-spacing: 0.06em;
            background: linear-gradient(135deg,
                    #ff0000, #ff7700, #ffdd00, #00ff00,
                    #0099ff, #6633ff, #cc00ff, #ff0099, #ff0000);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: rainbowFlow 5s ease-in-out infinite;
            filter: drop-shadow(0 0 40px rgba(168, 85, 247, 0.15));
        }

        @keyframes rainbowFlow {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .sub-title {
            color: rgba(255, 255, 255, 0.2);
            font-size: 14px;
            letter-spacing: 6px;
            font-weight: 300;
            margin-top: 6px;
        }

        .stats {
            color: rgba(255, 255, 255, 0.12);
            font-size: 13px;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .stats span {
            color: rgba(168, 85, 247, 0.4);
        }

        /* ===== 加载状态 ===== */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.15);
            font-size: 14px;
            letter-spacing: 2px;
        }

        .loading .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 2px solid rgba(168, 85, 247, 0.1);
            border-top: 2px solid rgba(168, 85, 247, 0.4);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* ===== 网站卡片网格 ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }

        .card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 20px 22px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
            display: block;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.05), rgba(236, 72, 153, 0.02));
            opacity: 0;
            transition: opacity 0.4s ease;
            border-radius: 16px;
        }

        .card:hover::before {
            opacity: 1;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(168, 85, 247, 0.2);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), 0 0 30px rgba(168, 85, 247, 0.03);
        }

        /* ===== 卡片头部：图标 + 名称 ===== */
        .card .top {
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            z-index: 1;
        }

        .card .icon-wrap {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card .icon-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card .icon-wrap .fallback {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.2);
        }

        .card .name {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            position: relative;
            z-index: 1;
            flex: 1;
        }

        .card .url {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
            margin-top: 6px;
            word-break: break-all;
            position: relative;
            z-index: 1;
            font-family: 'Consolas', monospace;
            padding-left: 48px;
        }

        .card .desc {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 6px;
            position: relative;
            z-index: 1;
            padding-left: 48px;
        }

        .card .badge {
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.1);
            letter-spacing: 1px;
            z-index: 1;
        }

        /* ===== 空状态 ===== */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.15);
        }

        .empty .big {
            font-size: 48px;
            margin-bottom: 16px;
        }

        /* ===== 底部 ===== */
        .footer {
            text-align: center;
            margin-top: 40px;
            color: rgba(255, 255, 255, 0.04);
            font-size: 12px;
            letter-spacing: 2px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            body {
                padding: 24px 14px;
            }
            .grid {
                grid-template-columns: 1fr;
            }
            .card {
                padding: 16px 18px;
            }
            .rainbow-title {
                font-size: 2rem;
            }
            .card .url,
            .card .desc {
                padding-left: 0;
            }
            .card .top {
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 背景层 ===== -->
    <div class="bg-layer">
        <div class="grid-bg"></div>
        <div class="glow"></div>
        <div class="glow"></div>
        <div class="glow"></div>
    </div>

    <!-- ===== 主内容 ===== -->
    <div class="container">

        <!-- 标题 -->
        <div class="header">
            <h1 class="rainbow-title">一些小破烂</h1>
            <p class="sub-title">✦ 收集世间美好 ✦</p>
            <p class="stats" id="stats">加载中...</p>
        </div>

        <!-- 卡片网格 -->
        <div class="grid" id="cardGrid">
            <div class="loading">
                <div class="spinner"></div>
                <div>加载收藏夹...</div>
            </div>
        </div>

        <!-- 底部 -->
        <div class="footer" id="footerYear">✦ 2026 ✦</div>
    </div>

    <script>
        // ============================================================
        //  📁 自动适配 GitHub Pages 路径（/myweb/）
        // ============================================================

        // 获取当前路径：如果是 /myweb/ 则加上，否则用相对路径
        function getBasePath() {
            const path = window.location.pathname;
            // 如果当前在 /myweb/ 目录下，用 /myweb/
            if (path.startsWith('/myweb/')) {
                return '/myweb/';
            }
            // 本地开发或其他情况，用相对路径
            return '';
        }

        const BASE = getBasePath();

        // ============================================================
        //  📁 读取 data.json → 自动在 icons/ 找 名称.jpg
        // ============================================================

        const grid = document.getElementById('cardGrid');
        const statsEl = document.getElementById('stats');

        // ===== 安全文件名 =====
        function safeFileName(name) {
            return name.replace(/[\\/:*?"<>|]/g, '').trim();
        }

        // ===== 渲染卡片 =====
        function renderSites(sites) {
            if (!sites || sites.length === 0) {
                grid.innerHTML = `
                            <div class="empty">
                                <div class="big">📭</div>
                                <p>还没有收藏<br><small style="font-size:12px;opacity:0.5;">在 data.json 里添加网站吧</small></p>
                            </div>
                        `;
                statsEl.innerHTML = '共 <span>0</span> 个收藏';
                return;
            }

            let html = '';
            let validCount = 0;

            for (const item of sites) {
                const name = item.name || '未命名';
                const url = item.url || '#';
                const desc = item.desc || '';

                if (!url || url === '#') continue;
                validCount++;

                const displayUrl = url.replace(/^https?:\/\//, '').replace(/\/.*$/, '');

                // 🎯 自动匹配图标：icons/名称.jpg（自动适配路径）
                const safeName = safeFileName(name);
                const iconPath = `${BASE}icons/${safeName}.jpg`;

                html += `
                            <a href="${url}" target="_blank" class="card" rel="noopener">
                                <span class="badge">↗</span>
                                <div class="top">
                                    <div class="icon-wrap">
                                        <img src="${iconPath}" alt="${name}" 
                                             onerror="this.style.display='none';this.parentElement.innerHTML='<span class=\\'fallback\\'>🌐</span>'">
                                    </div>
                                    <span class="name">${name}</span>
                                </div>
                                <div class="url">${displayUrl}</div>
                                ${desc ? `<div class="desc">${desc}</div>` : ''}
                            </a>
                        `;
            }

            grid.innerHTML = html || `
                        <div class="empty">
                            <div class="big">📭</div>
                            <p>还没有有效收藏<br><small style="font-size:12px;opacity:0.5;">检查 data.json 的 url 格式</small></p>
                        </div>
                    `;

            statsEl.innerHTML = `共 <span>${validCount}</span> 个收藏`;
        }

        // ===== 加载 data.json =====
        async function loadData() {
            try {
                const dataUrl = `${BASE}data.json`;
                console.log('📁 加载数据:', dataUrl);

                const response = await fetch(dataUrl);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();

                let sites = [];
                if (Array.isArray(data)) {
                    sites = data;
                } else if (data.sites && Array.isArray(data.sites)) {
                    sites = data.sites;
                } else {
                    const keys = Object.keys(data);
                    if (keys.length > 0 && typeof data[keys[0]] === 'string') {
                        sites = keys.map(key => ({ name: key, url: data[key] }));
                    } else {
                        throw new Error('未知的数据格式');
                    }
                }

                renderSites(sites);
                console.log(`✅ 加载成功，共 ${sites.length} 个网站`);

            } catch (error) {
                console.error('❌ 加载失败:', error);
                grid.innerHTML = `
                            <div class="empty">
                                <div class="big">⚠️</div>
                                <p>数据加载失败<br>
                                <small style="font-size:12px;opacity:0.5;">
                                    请确保 data.json 文件存在且格式正确<br>
                                    错误: ${error.message}
                                </small></p>
                            </div>
                        `;
                statsEl.innerHTML = '加载失败';
            }
        }

        // ===== 年份自动更新 =====
        document.getElementById('footerYear').textContent = `✦ ${new Date().getFullYear()} ✦`;

        // ===== 鼠标跟随光晕 =====
        const glow = document.createElement('div');
        glow.style.cssText = `
                    position: fixed;
                    width: 400px;
                    height: 400px;
                    border-radius: 50%;
                    pointer-events: none;
                    z-index: 1;
                    background: radial-gradient(circle, rgba(168,85,247,0.04), transparent 70%);
                    transform: translate(-50%, -50%);
                    opacity: 0;
                    transition: opacity 0.5s ease;
                `;
        document.body.appendChild(glow);

        let hideTimeout;
        document.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
            glow.style.opacity = '1';
            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => {
                glow.style.opacity = '0';
            }, 800);
        });

        // ===== 启动加载 =====
        loadData();
    </script>

</body>
</html>
